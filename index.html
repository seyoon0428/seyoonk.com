<!DOCTYPE html>
<!--
  What is DOCTYPE?
  This tells the browser "this is a modern HTML5 document."
  Without it, browsers fall back to a quirky legacy rendering mode.
-->
<html lang="en">

<head>
  <!--
    The <head> is not visible on the page. It contains metadata —
    information ABOUT the page that browsers and search engines use.
  -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Seyoon Kim</title>
  <meta name="description" content="Seyoon Kim — Product Manager based in NYC.">

  <!--
    Favicon: the small icon shown in browser tabs and bookmarks.
    SVG favicons are modern and scale to any size without blurring.
  -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!--
    Open Graph tags: control how the page looks when shared on
    LinkedIn, Slack, iMessage, etc. Without these, apps make up
    their own preview — often badly.
  -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://seyoonk.com/">
  <meta property="og:title" content="Seyoon Kim">
  <meta property="og:description" content="Product Manager based in NYC.">
  <meta property="og:image" content="https://seyoonk.com/hero.jpg">

  <!--
    Twitter Card tags: same idea as Open Graph, but specifically
    for X (Twitter). summary_large_image shows a big image preview.
  -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Seyoon Kim">
  <meta name="twitter:description" content="Product Manager based in NYC.">
  <meta name="twitter:image" content="https://seyoonk.com/hero.jpg">

  <!--
    JSON-LD structured data: a machine-readable description of who
    this page is about. Google uses this to understand the content
    and can display it in rich search results.
  -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Seyoon Kim",
    "url": "https://seyoonk.com",
    "jobTitle": "Product Manager",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "New York City",
      "addressRegion": "NY"
    },
    "sameAs": [
      "https://www.linkedin.com/in/seyoonkim/"
    ]
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAV ---------------------------------------------------- -->
  <nav>
    <div class="container nav-inner">
      <a href="index.html" class="nav-name">Seyoon Kim</a>
      <div class="nav-links">
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
      </div>
    </div>
  </nav>

  <!-- MAIN --------------------------------------------------- -->
  <main>
    <div class="container hero">
      <p class="welcome">Welcome.</p>
      <!--
        hero.jpg = the Central Park winter photo.
        alt text describes the image for screen readers and search engines.
        If the image file is missing, the alt text displays in its place.
      -->
      <img
        src="hero.jpg"
        alt="Central Park in winter — snow-covered trees, the Bow Bridge, and the San Remo towers at dusk"
        class="hero-image"
      >
    </div>
  </main>

  <!-- FOOTER ------------------------------------------------- -->
  <footer>
    <div class="container footer-inner">
      <p>© 2026 Seyoon Kim</p>
    </div>
  </footer>

</body>
</html>
